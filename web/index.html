<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NurPath — Your Spiritual Quran Companion">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NurPath">

  <!-- Open Graph -->
  <meta property="og:title" content="NurPath — Quran Companion">
  <meta property="og:description" content="Learn, reflect and grow with the Quran">
  <meta property="og:type" content="website">

  <!-- Theme color matches emerald brand -->
  <meta name="theme-color" content="#0A6C5E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <title>NurPath</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Loading screen */
    body {
      margin: 0;
      background-color: #0D1F1C;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .nurpath-logo {
      font-size: 32px;
      font-weight: 700;
      color: #D4A017;
      letter-spacing: 1px;
    }
    .nurpath-logo span {
      color: #EFF6F4;
    }
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid #1E4035;
      border-top-color: #0A6C5E;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="nurpath-logo">Nur<span>Path</span></div>
    <div class="loader"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
