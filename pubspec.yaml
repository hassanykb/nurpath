name: nurpath
description: NurPath - Your Spiritual Quran Companion

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Storage (web-compatible)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # Audio (just_audio has web support; background service is mobile-only)
  just_audio: ^0.9.40

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # UI & Charts
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.2

  # TTS (has web support)
  flutter_tts: ^4.0.2

  # Fonts & Icons
  google_fonts: ^6.2.1

  # Storage extras
  flutter_secure_storage: ^9.2.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.2.6

  # Navigation
  go_router: ^13.2.1

  # Animations
  flutter_animate: ^4.5.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/audio/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/AmiriQuran-Regular.ttf
